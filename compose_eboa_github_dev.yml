
services:

   eboa_db:
      image: mdillon/postgis
      container_name: eboa_db
      restart: always
      shm_size: 512M
      command: -c max_connections=5000 -c max_locks_per_transaction=5000
      networks:
         - boa_network

   eboa:
      build          :
         context: .
         dockerfile: Dockerfile.github.dev
      container_name : eboa
      hostname       : eboa
      environment    :
         - EBOA_DDBB_HOST=eboa_db
         - SBOA_DDBB_HOST=eboa_db
         - UBOA_DDBB_HOST=eboa_db
         - REPOSITORY_URI=${REPOSITORY_URI}
         - GITHUB_BRANCH=${GITHUB_BRANCH}
      restart        : always
      shm_size: 512M
      networks:
         - boa_network

networks:
   boa_network:
      name: boa_network
